name = "imgauth"
main = "worker.js"
compatibility_date = "2024-09-23"

[vars]
SIGNER_URL = "https://sgart.azurewebsites.net/sign"
# Notifica Telegram "nuovo certificato": un avviso ogni N certificati emessi.
# "1" = avvisa per ogni certificato; "5" = un avviso ogni 5, ecc.
# Per cambiare frequenza: modifica qui e `wrangler deploy` (oppure edita la var
# nel dashboard Cloudflare → Worker imgauth → Settings → Variables).
# La notifica parte solo se i secret TELEGRAM_BOT_TOKEN e TELEGRAM_CHAT_ID sono
# impostati (wrangler secret put …).
CERT_NOTIFY_EVERY = "1"

# Template PDF come ArrayBuffer (import in worker.js)
[[rules]]
type = "Data"
globs = ["**/*.pdf"]
fallthrough = true

# Copia archiviata: oggetti sotto pdf/<sha256>/certificato_<stamp>.pdf — l'hash
# nel prefisso rende il certificato recuperabile via GET /api/cert?hash= (i
# certificati pre-1.8.0, pdf/certificato_<stamp>.pdf, non sono indicizzati per hash).
# Crea il bucket su Cloudflare prima del deploy o adatta bucket_name.
[[r2_buckets]]
binding = "PDF_ARCHIVE"
bucket_name = "imgauth-pdf-archive"
# Giurisdizione EU: residenza dei dati in Europa (GDPR). Esiste un bucket omonimo
# anche in giurisdizione default (più vecchio, ora non usato); il worker scrive/legge
# SOLO quello EU grazie a questa riga. Switch fatto a clean slate (archivio svuotato).
jurisdiction = "eu"

# Rate limiting nativo (anti-abuso/DoS, per-IP). Vedi worker.js › fetch e
# CLAUDE.md › Sicurezza emissione certificati. period: solo 10 o 60 secondi.
# RL_CERT: endpoint costoso /api/cert-pdf (firma Azure + scrittura R2).
[[ratelimits]]
name = "RL_CERT"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 10
  period = 60

# RL_API: endpoint leggeri /api/hash e /api/verify.
[[ratelimits]]
name = "RL_API"
namespace_id = "1002"
  [ratelimits.simple]
  limit = 60
  period = 60