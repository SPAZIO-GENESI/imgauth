name = "imgauth"
main = "worker.js"
compatibility_date = "2024-09-23"

# Smart Placement (2026-07-03): il Worker chiama ripetutamente un backend fisso e
# "lontano" (authart su Azure Italy North, R2, TSA/OTS) più spesso di quanto risponda
# a richieste vicine all'utente. Osservato via /api/health-log: gli health-check verso
# authart misurati da Cloudflare (~1.3-2s) erano ~10x più lenti di una chiamata diretta
# alla stessa URL (~150ms) — sintomo di tratta Worker→origine subottimale, non di lentezza
# di authart stesso (l'endpoint / non fa nulla). Smart Placement lascia che Cloudflare
# scelga dinamicamente dove eseguire in base a dove sono i backend più chiamati.
[placement]
mode = "smart"

# Il custom domain imgauth.spaziogenesi.org è un CNAME proxato → imgauth.it-e3f.workers.dev:
# dipende quindi dalla route workers.dev. Le versioni recenti di wrangler la disabilitano
# se non dichiarata, mandando il dominio in 522. Tenere ESPLICITAMENTE abilitata.
workers_dev = true

# Pagina "certificato verificabile online" GET /c/<sha256> (handleCertPage) e,
# dalla 1.16.0, la pagina di autorizzazione device flow GET /agent/authorize
# (P21). Le route qui sotto servono sull'URL canonico attestazione.spaziogenesi.org:
# intercettano SOLO /c/* e /agent/*; tutto il resto del dominio continua ad
# andare a GitHub Pages (authweb).
# Prerequisito già soddisfatto: il record attestazione.spaziogenesi.org è già PROXATO
# da Cloudflare (verificato 2026-06-25). Il Worker risponde anche sul proprio custom
# domain → https://imgauth.spaziogenesi.org/c/<hash> e /agent/authorize.
# ⚠️ La chiave `routes` è DICHIARATIVA: il deploy imposta ESATTAMENTE questo elenco
# e rimuove le route non listate. La prima riga è quella che serve l'intera API sul
# custom domain del Worker: NON rimuoverla (senza, imgauth.spaziogenesi.org va in 522).
routes = [
  { pattern = "imgauth.spaziogenesi.org/*", zone_name = "spaziogenesi.org" },
  { pattern = "attestazione.spaziogenesi.org/c/*", zone_name = "spaziogenesi.org" },
  { pattern = "attestazione.spaziogenesi.org/agent/*", zone_name = "spaziogenesi.org" }
]

# Cron: campiona lo stato dei servizi e aggiorna il rollup giornaliero in R2
# (status/history.json) per la pagina /status (barre 90 giorni). Ogni 30 minuti.
[triggers]
crons = ["*/30 * * * *"]

[vars]
SIGNER_URL = "https://sgart.azurewebsites.net/sign"
# Notifica Telegram "nuovo certificato": un avviso ogni N certificati emessi.
# "1" = avvisa per ogni certificato; "5" = un avviso ogni 5, ecc.
# Per cambiare frequenza: modifica qui e `wrangler deploy` (oppure edita la var
# nel dashboard Cloudflare → Worker imgauth → Settings → Variables).
# La notifica parte solo se i secret TELEGRAM_BOT_TOKEN e TELEGRAM_CHAT_ID sono
# impostati (wrangler secret put …).
CERT_NOTIFY_EVERY = "1"

# P22: quota mensile delle chiavi sg_k_… emesse self-service da /developer/keys
# (email verificata OAuth). Non è un segreto (a differenza dei client secret
# OAuth, che sono Cloudflare secrets — vedi CLAUDE.md § imgauth › Segreti).
DEV_KEY_QUOTA = "50"

# P22: client ID OAuth (pubblici per design — solo i client secret sono
# Cloudflare secrets). Redirect URI registrati in FASE 0:
# https://imgauth.spaziogenesi.org/api/dev/oauth/callback/<provider>
GOOGLE_OAUTH_CLIENT_ID = "309187343194-vrk29hp8hiuhofom419qkl3hrqm01pk8.apps.googleusercontent.com"
MS_OAUTH_CLIENT_ID = "1876aab5-0cb1-4bbd-acfe-7277f768e3d1"

# Template PDF come ArrayBuffer (import in worker.js)
[[rules]]
type = "Data"
globs = ["**/*.pdf"]
fallthrough = true

# Swagger UI ufficiale (Apache-2.0) per /docs — nessun CDN di terze parti,
# stesso principio già seguito per pdf.js. Serviti come Static Assets
# (public/docs/*), NON tramite import in worker.js: importarli come modulo
# "Text" (tentativo iniziale) produceva contenuto troncato/tipizzato male in
# wrangler dev per file di questa dimensione (>250KB) — bug/limite del
# loader, non del nostro codice. Gli asset statici hanno priorità sul Worker
# per i path che combaciano (comportamento di default, nessun run_worker_first
# necessario: /docs stesso resta gestito dal Worker perché non c'è un
# index.html in public/docs/).
[assets]
directory = "public"
binding = "ASSETS"

# Copia archiviata: oggetti sotto pdf/<sha256>/certificato_<stamp>.pdf — l'hash
# nel prefisso rende il certificato recuperabile via GET /api/cert?hash= (i
# certificati pre-1.8.0, pdf/certificato_<stamp>.pdf, non sono indicizzati per hash).
# Crea il bucket su Cloudflare prima del deploy o adatta bucket_name.
[[r2_buckets]]
binding = "PDF_ARCHIVE"
bucket_name = "imgauth-pdf-archive"
# Giurisdizione EU: residenza dei dati in Europa (GDPR). Esiste un bucket omonimo
# anche in giurisdizione default (più vecchio, ora non usato); il worker scrive/legge
# SOLO quello EU grazie a questa riga. Switch fatto a clean slate (archivio svuotato).
jurisdiction = "eu"

# Rate limiting nativo (anti-abuso/DoS, per-IP). Vedi worker.js › fetch e
# CLAUDE.md › Sicurezza emissione certificati. period: solo 10 o 60 secondi.
# RL_CERT: endpoint costoso /api/cert-pdf (firma Azure + scrittura R2).
[[ratelimits]]
name = "RL_CERT"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 10
  period = 60

# RL_API: endpoint leggeri /api/hash e /api/verify.
[[ratelimits]]
name = "RL_API"
namespace_id = "1002"
  [ratelimits.simple]
  limit = 60
  period = 60

# D1: log fine degli eventi di salute (errori, degradi, rallentamenti sotto soglia)
# campionati dai check di /api/status e dal cron. Esposto da GET /api/health-log per
# il drill-down "esplora il giorno" della pagina /status. Binding `DB` (env.DB).
# Scrittura non-blocking: un errore D1 non interrompe il Worker (vedi logHealth).
[[d1_databases]]
binding = "DB"
database_name = "imgauth-health"
database_id = "6120b7af-bf22-43de-b1f8-e28163dc5df1"