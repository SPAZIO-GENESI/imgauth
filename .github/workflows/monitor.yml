# Guardiano esterno dello stato del servizio.
# Interroga periodicamente /api/status (che aggrega worker, archivio R2,
# firmatario authart e calendar OpenTimestamps) e, in caso di guasto:
#   - apre una issue di alert (o commenta quella aperta, niente spam);
#   - invia una notifica Telegram (se configurata) al PRIMO rilevamento;
#   - fa fallire il run → GitHub invia anche l'email di workflow fallito.
# Quando i servizi tornano operativi: commenta e RICHIUDE la issue e manda
# il Telegram di "tutto ok". Le notifiche Telegram scattano solo sui CAMBI di
# stato (giù→su / su→giù), quindi non spammano mentre il disservizio dura.
#
# Telegram è OPZIONALE: se i secret non ci sono, il monitor funziona comunque
# (issue + email). Per attivarlo, aggiungi nei secrets del repo:
#   TELEGRAM_BOT_TOKEN  (token del bot creato con @BotFather)
#   TELEGRAM_CHAT_ID    (id della chat dove ricevere gli avvisi)
#
# Nota: i run schedulati di GitHub possono ritardare di qualche minuto e
# vengono sospesi dopo 60 giorni di inattività del repo. Guardiano best-effort.

name: Monitor /api/status

on:
  schedule:
    - cron: "*/15 * * * *"   # ogni 15 minuti (UTC)
  workflow_dispatch:          # esecuzione manuale per test

permissions:
  issues: write
  contents: read

concurrency:
  group: status-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Controlla /api/status, alert e notifiche
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          script: |
            const URL = "https://imgauth.spaziogenesi.org/api/status";
            const LABEL = "status-alert";
            const { owner, repo } = context.repo;
            const CRITICI = ["worker", "archive", "signer"]; // anchor = fail-open, solo informativo

            // Notifica Telegram (no-op se i secret non sono configurati)
            async function telegram(text) {
              const token = process.env.TELEGRAM_BOT_TOKEN;
              const chat = process.env.TELEGRAM_CHAT_ID;
              if (!token || !chat) return;
              try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ chat_id: chat, text, disable_web_page_preview: true }),
                });
              } catch (e) { core.warning("Telegram fallito: " + e.message); }
            }

            // 1) Sonda
            let problems = [];
            let detail = "n/d";
            try {
              const res = await fetch(URL, { signal: AbortSignal.timeout(15000) });
              if (!res.ok) {
                problems.push(`risposta HTTP ${res.status}`);
              } else {
                const s = await res.json();
                detail = JSON.stringify(s);
                for (const k of CRITICI) if (s[k] !== "ok") problems.push(`${k} = ${s[k]}`);
                if (s.anchor && s.anchor !== "ok") core.warning(`anchor = ${s.anchor} (non critico)`);
              }
            } catch (e) {
              problems.push(`endpoint irraggiungibile (${e.message})`);
            }

            // 2) Issue di alert eventualmente già aperta
            const open = await github.rest.issues.listForRepo({ owner, repo, state: "open", labels: LABEL, per_page: 1 });
            const existing = open.data[0];
            const now = new Date().toISOString();

            if (problems.length) {
              const body = [
                "Rilevato un problema sui servizi (`/api/status`):",
                "", ...problems.map(p => `- ${p}`), "",
                "```json", detail, "```", "", `Controllo: ${now}`,
              ].join("\n");
              if (existing) {
                // già in allarme: aggiorna la issue, NIENTE Telegram (no spam)
                await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
              } else {
                // PRIMO rilevamento: apri issue + Telegram
                const created = await github.rest.issues.create({
                  owner, repo, title: "🔴 Disservizio rilevato (/api/status)", body, labels: [LABEL],
                });
                await telegram(`🔴 Spazio Genesi — disservizio rilevato\n${problems.join("\n")}\n${detail}\nIssue #${created.data.number}`);
              }
              core.setFailed("Problemi: " + problems.join(", "));
            } else {
              console.log("OK: " + detail);
              if (existing) {
                // RIPRISTINO: commenta, chiudi issue + Telegram di rientro
                await github.rest.issues.createComment({
                  owner, repo, issue_number: existing.number,
                  body: `✅ Servizi tornati operativi.\n\n\`\`\`json\n${detail}\n\`\`\`\n\nControllo: ${now}`,
                });
                await github.rest.issues.update({ owner, repo, issue_number: existing.number, state: "closed" });
                await telegram(`✅ Spazio Genesi — servizi tornati operativi\n${detail}`);
              } else if (context.eventName === "workflow_dispatch") {
                // Esecuzione manuale con tutto ok: messaggio di prova, per verificare
                // che la notifica Telegram sia configurata correttamente.
                await telegram(`✅ Test monitor Spazio Genesi: tutti i servizi operativi.\n${detail}`);
              }
            }
