# Guardiano esterno dello stato del servizio.
# Interroga periodicamente /api/status (che aggrega worker, archivio R2,
# firmatario authart e calendar OpenTimestamps) e, in caso di guasto:
#   - apre una issue di alert (o commenta quella aperta, niente spam);
#   - invia una notifica Telegram (se configurata) al PRIMO rilevamento;
#   - fa fallire il run → GitHub invia anche l'email di workflow fallito.
# Quando i servizi tornano operativi: commenta e RICHIUDE la issue e manda
# il Telegram di "tutto ok". Le notifiche Telegram scattano solo sui CAMBI di
# stato (giù→su / su→giù), quindi non spammano mentre il disservizio dura.
#
# Telegram è OPZIONALE: se i secret non ci sono, il monitor funziona comunque
# (issue + email). Per attivarlo, aggiungi nei secrets del repo:
#   TELEGRAM_BOT_TOKEN  (token del bot creato con @BotFather)
#   TELEGRAM_CHAT_ID    (id della chat dove ricevere gli avvisi)
#
# Nota: i run schedulati di GitHub possono ritardare di qualche minuto e
# vengono sospesi dopo 60 giorni di inattività del repo. Guardiano best-effort.
#
# Secondo job "canary": rileva una rotazione ERRATA di HMAC_SECRET, cosa che
# la sonda interna di /api/status NON vede (quella rifà firma+verifica con il
# segreto ATTUALE, quindi resta "coerente" anche se il segreto è stato
# cambiato per errore). Serve un'attestazione nota, firmata una volta col
# segreto corretto e conservata FUORI dal Worker, da ricontrollare nel tempo.
# Richiede tre variabili di repo (Settings → Secrets and variables → Actions
# → Variables — NON secrets: sono dati della stessa classe stampata su un
# certificato, non compromettono nulla se esposti):
#   CANARY_HASH           sha256 di un'opera di prova fissa
#   CANARY_ATTESTAZIONE   stringa "SHA-256:<hash>@<timestamp_iso>" restituita da /api/hash
#   CANARY_HMAC           firma hmac restituita dallo stesso /api/hash
# Finché queste variabili non sono impostate, il job salta il controllo
# (nessun falso allarme). Vedi CTL-hmac-canary nel registro pubblico gtf.

name: Monitor /api/status

on:
  schedule:
    - cron: "*/15 * * * *"   # ogni 15 minuti (UTC)
  workflow_dispatch:          # esecuzione manuale per test

permissions:
  issues: write
  contents: read

concurrency:
  group: status-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Controlla /api/status, alert e notifiche
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          script: |
            const URL = "https://imgauth.spaziogenesi.org/api/status";
            const LABEL = "status-alert";
            const { owner, repo } = context.repo;
            const CRITICI = ["worker", "archive", "signer"]; // anchor = fail-open, solo informativo

            // ── Formattazione messaggio Telegram (semafori grafici) ──
            const NOMI = {
              worker:  "Generazione attestazione",
              signer:  "Firma certificato (PDF)",
              archive: "Archivio e recupero",
              anchor:  "Ancoraggio blockchain",
            };
            const PALLINO = { ok: "🟢", down: "🔴", degraded: "🟡" };
            const STATO   = { ok: "operativo", down: "non disponibile", degraded: "rallentato" };
            const pallino = v => PALLINO[v] || "⚪";
            const stato   = v => STATO[v] || "non rilevato";
            function oraUtc(iso) {
              const d = iso ? new Date(iso) : new Date();
              if (isNaN(d.getTime())) return iso || "";
              const p = n => String(n).padStart(2, "0");
              return `${p(d.getUTCDate())}/${p(d.getUTCMonth() + 1)}/${d.getUTCFullYear()} ` +
                     `${p(d.getUTCHours())}:${p(d.getUTCMinutes())}:${p(d.getUTCSeconds())} UTC`;
            }
            function messaggio(titolo, s) {
              const righe = [titolo, ""];
              if (s) {
                for (const k of ["worker", "signer", "archive", "anchor"]) {
                  righe.push(`${pallino(s[k])} ${NOMI[k]}: ${stato(s[k])}`);
                }
                righe.push("", `🕓 Controllo: ${oraUtc(s.checked_at)}`);
              } else {
                righe.push("⚠️ Endpoint /api/status irraggiungibile.", "", `🕓 Controllo: ${oraUtc(null)}`);
              }
              return righe.join("\n");
            }

            async function telegram(text) {
              const token = process.env.TELEGRAM_BOT_TOKEN;
              const chat = process.env.TELEGRAM_CHAT_ID;
              if (!token || !chat) return;
              try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ chat_id: chat, text, disable_web_page_preview: true }),
                });
              } catch (e) { core.warning("Telegram fallito: " + e.message); }
            }

            // 1) Sonda
            let problems = [];
            let statusObj = null;
            let detail = "n/d";
            try {
              const res = await fetch(URL, { signal: AbortSignal.timeout(15000) });
              if (!res.ok) {
                problems.push(`risposta HTTP ${res.status}`);
              } else {
                statusObj = await res.json();
                detail = JSON.stringify(statusObj);
                for (const k of CRITICI) if (statusObj[k] !== "ok") problems.push(`${k} = ${statusObj[k]}`);
                if (statusObj.anchor && statusObj.anchor !== "ok") core.warning(`anchor = ${statusObj.anchor} (non critico)`);
              }
            } catch (e) {
              problems.push(`endpoint irraggiungibile (${e.message})`);
            }

            // 2) Issue di alert eventualmente già aperta
            const open = await github.rest.issues.listForRepo({ owner, repo, state: "open", labels: LABEL, per_page: 1 });
            const existing = open.data[0];
            const now = new Date().toISOString();

            if (problems.length) {
              const body = [
                "Rilevato un problema sui servizi (`/api/status`):",
                "", ...problems.map(p => `- ${p}`), "",
                "```json", detail, "```", "", `Controllo: ${now}`,
              ].join("\n");
              if (existing) {
                // già in allarme: aggiorna la issue, NIENTE Telegram (no spam)
                await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
              } else {
                // PRIMO rilevamento: apri issue + Telegram
                const created = await github.rest.issues.create({
                  owner, repo, title: "🔴 Disservizio rilevato (/api/status)", body, labels: [LABEL],
                });
                await telegram(messaggio("🔴 Spazio Genesi — disservizio rilevato", statusObj));
              }
              core.setFailed("Problemi: " + problems.join(", "));
            } else {
              console.log("OK: " + detail);
              if (existing) {
                // RIPRISTINO: commenta, chiudi issue + Telegram di rientro
                await github.rest.issues.createComment({
                  owner, repo, issue_number: existing.number,
                  body: `✅ Servizi tornati operativi.\n\n\`\`\`json\n${detail}\n\`\`\`\n\nControllo: ${now}`,
                });
                await github.rest.issues.update({ owner, repo, issue_number: existing.number, state: "closed" });
                await telegram(messaggio("✅ Spazio Genesi — servizi tornati operativi", statusObj));
              } else if (context.eventName === "workflow_dispatch") {
                // Esecuzione manuale con tutto ok: messaggio di prova.
                await telegram(messaggio("✅ Spazio Genesi — test monitor", statusObj));
              }
            }

  canary:
    runs-on: ubuntu-latest
    steps:
      - name: Canary HMAC — rileva una rotazione errata del segreto
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CANARY_HASH: ${{ vars.CANARY_HASH }}
          CANARY_ATTESTAZIONE: ${{ vars.CANARY_ATTESTAZIONE }}
          CANARY_HMAC: ${{ vars.CANARY_HMAC }}
        with:
          script: |
            const URL = "https://imgauth.spaziogenesi.org/api/verify";
            const LABEL = "hmac-canary-alert";
            const { owner, repo } = context.repo;

            const HASH = process.env.CANARY_HASH;
            const ATTESTAZIONE = process.env.CANARY_ATTESTAZIONE;
            const HMAC = process.env.CANARY_HMAC;

            if (!HASH || !ATTESTAZIONE || !HMAC) {
              core.warning("Variabili canary non impostate (CANARY_HASH/CANARY_ATTESTAZIONE/CANARY_HMAC) — controllo saltato. Vedi CTL-hmac-canary nel registro pubblico gtf.");
              return;
            }

            async function telegram(text) {
              const token = process.env.TELEGRAM_BOT_TOKEN;
              const chat = process.env.TELEGRAM_CHAT_ID;
              if (!token || !chat) return;
              try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ chat_id: chat, text, disable_web_page_preview: true }),
                });
              } catch (e) { core.warning("Telegram fallito: " + e.message); }
            }

            let valid = false;
            let detail = "n/d";
            try {
              const form = new FormData();
              form.append("hash", HASH);
              form.append("attestazione", ATTESTAZIONE);
              form.append("hmac", HMAC);
              const res = await fetch(URL, { method: "POST", body: form, signal: AbortSignal.timeout(15000) });
              const json = await res.json();
              detail = JSON.stringify(json);
              valid = json.hmac_valido === true;
            } catch (e) {
              detail = `errore: ${e.message}`;
            }

            const open = await github.rest.issues.listForRepo({ owner, repo, state: "open", labels: LABEL, per_page: 1 });
            const existing = open.data[0];
            const now = new Date().toISOString();

            if (!valid) {
              const body = [
                "Il canary HMAC (un'attestazione nota, firmata una volta col segreto corretto) NON verifica più.",
                "",
                "Questo NON viene rilevato dalla sonda interna di /api/status: quella rifà un round-trip firma+verifica col segreto ATTUALE, quindi resta 'coerente' anche se il segreto è stato ruotato per errore. Solo un valore firmato esternamente (questo canary) se ne accorge.",
                "",
                "Se HMAC_SECRET è stato toccato di recente, va ripristinato al valore originale (non ruotare mai di proposito: vedi CLAUDE.md e il caveau dei segreti).",
                "",
                "```json", detail, "```", "", `Controllo: ${now}`,
              ].join("\n");
              if (existing) {
                await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
              } else {
                await github.rest.issues.create({
                  owner, repo, title: "🔴 Canary HMAC: verifica fallita — possibile rotazione errata del segreto", body, labels: [LABEL],
                });
                await telegram(`🔴 Spazio Genesi — canary HMAC fallito\n\nPossibile rotazione errata di HMAC_SECRET.\n\nControllo: ${now}`);
              }
              core.setFailed("Canary HMAC non valido: " + detail);
            } else {
              console.log("Canary HMAC OK: " + detail);
              if (existing) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: existing.number,
                  body: `✅ Canary HMAC tornato valido.\n\n\`\`\`json\n${detail}\n\`\`\`\n\nControllo: ${now}`,
                });
                await github.rest.issues.update({ owner, repo, issue_number: existing.number, state: "closed" });
                await telegram(`✅ Spazio Genesi — canary HMAC tornato valido\n\nControllo: ${now}`);
              } else if (context.eventName === "workflow_dispatch") {
                await telegram(`✅ Spazio Genesi — test canary HMAC ok\n\nControllo: ${now}`);
              }
            }
