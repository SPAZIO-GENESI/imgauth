<hr style="margin: 2.5rem 0 1.8rem; border: none; border-top: 1px solid #eee;">

<label class="field-label">Verifica corrispondenza hash ↔ file:</label>

<div class="drop-zone" id="verifyDropZone">
  <input type="file" id="verifyFileInput" accept="image/jpeg,image/png,image/gif,image/webp,image/tiff,image/bmp,image/svg+xml">
  <p class="drop-primary">Trascina il file da verificare, o clicca per selezionare</p>
  <p class="drop-hint">Il file deve essere lo stesso usato per l'hash dichiarato</p>
</div>

<div class="preview-row" id="verifyPreviewRow">
  <img class="preview-thumb" id="verifyPreviewImg" src="" alt="">
  <div class="preview-info">
    <div class="preview-fname" id="verifyPreviewName"></div>
    <div class="preview-fmeta" id="verifyPreviewMeta"></div>
  </div>
</div>

<div style="margin-top: 0.9rem;">
  <label class="field-label" for="verifyHashInput">Hash dichiarato (SHA-256):</label>
  <input id="verifyHashInput" type="text" style="width:100%; padding:0.5rem 0.6rem; border:1px solid #ddd; border-radius:4px; font-size:0.8rem;">
</div>

<div class="error-msg" id="verifyErrorMsg"></div>

<div class="btn-row" style="margin-top:1.1rem;">
  <button class="primary" id="verifyBtn" disabled>
    <span id="verifyBtnLabel">Verifica hash</span>
  </button>
</div>

<div class="result-wrap" id="verifyResultWrap">
  <p class="result-section-title">Esito verifica</p>
  <div class="hash-block">
    <div class="hash-label-small">Hash calcolato</div>
    <div class="hash-string" id="verifyHashCalc"></div>
  </div>
  <p id="verifyOutcome" style="font-size:0.8rem; margin-top:0.4rem;"></p>
</div>

<script>
  const WORKER_HASH_URL   = "https://imgauth.it-e3f.workers.dev/api/hash";
  const WORKER_VERIFY_URL = "https://imgauth.it-e3f.workers.dev/api/verify";
  const WORKER_PDF_URL    = "https://imgauth.it-e3f.workers.dev/api/cert-pdf";

  const fileInput   = document.getElementById("fileInput");
  const dropZone    = document.getElementById("dropZone");
  const previewRow  = document.getElementById("previewRow");
  const previewImg  = document.getElementById("previewImg");
  const previewName = document.getElementById("previewName");
  const previewMeta = document.getElementById("previewMeta");
  const attestBtn   = document.getElementById("attestBtn");
  const btnLabel    = document.getElementById("btnLabel");
  const errorMsg    = document.getElementById("errorMsg");
  const resultWrap  = document.getElementById("resultWrap");
  const downloadBtn = document.getElementById("downloadBtn");

  // Verifica
  const verifyFileInput   = document.getElementById("verifyFileInput");
  const verifyDropZone    = document.getElementById("verifyDropZone");
  const verifyPreviewRow  = document.getElementById("verifyPreviewRow");
  const verifyPreviewImg  = document.getElementById("verifyPreviewImg");
  const verifyPreviewName = document.getElementById("verifyPreviewName");
  const verifyPreviewMeta = document.getElementById("verifyPreviewMeta");
  const verifyHashInput   = document.getElementById("verifyHashInput");
  const verifyErrorMsg    = document.getElementById("verifyErrorMsg");
  const verifyBtn         = document.getElementById("verifyBtn");
  const verifyBtnLabel    = document.getElementById("verifyBtnLabel");
  const verifyResultWrap  = document.getElementById("verifyResultWrap");
  const verifyHashCalc    = document.getElementById("verifyHashCalc");
  const verifyOutcome     = document.getElementById("verifyOutcome");

  let selectedFile = null;
  let lastData = null;

  let verifyFile = null;

  function fmt(b) {
    if (b < 1024) return b + " B";
    if (b < 1048576) return (b/1024).toFixed(1) + " KB";
    return (b/1048576).toFixed(2) + " MB";
  }

  function loadFile(f) {
    selectedFile = f;
    previewName.textContent = f.name;
    previewMeta.textContent = f.type + " · " + fmt(f.size);
    const fr = new FileReader();
    fr.onload = e => { previewImg.src = e.target.result; };
    fr.readAsDataURL(f);
    previewRow.classList.add("show");
    attestBtn.disabled = false;
    resultWrap.classList.remove("show");
    errorMsg.classList.remove("show");
    lastData = null;
  }

  fileInput.addEventListener("change", () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("over"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("over"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("over");
    const f = e.dataTransfer.files[0];
    if (f) { fileInput.files = e.dataTransfer.files; loadFile(f); }
  });

  attestBtn.addEventListener("click", async () => {
    if (!selectedFile) return;
    attestBtn.classList.add("loading");
    attestBtn.disabled = true;
    btnLabel.textContent = "Elaborazione…";
    errorMsg.classList.remove("show");
    resultWrap.classList.remove("show");

    try {
      const fd = new FormData();
      fd.append("image", selectedFile);
      const res = await fetch(WORKER_HASH_URL, { method: "POST", body: fd });
      const d = await res.json();
      if (!res.ok) { showErr(d.error || "Errore " + res.status); return; }

      lastData = d;
      document.getElementById("rHash").textContent        = d.sha256;
      document.getElementById("rFilename").textContent    = d.opera;
      document.getElementById("rSize").textContent        = fmt(d.dimensione_bytes);
      document.getElementById("rMime").textContent        = d.tipo_mime;
      document.getElementById("rTimestamp").textContent   = d.timestamp_leggibile;
      document.getElementById("rIssuer").textContent      = d.emesso_da;
      document.getElementById("rAttestation").textContent = d.attestazione;

      resultWrap.classList.add("show");
      resultWrap.scrollIntoView({ behavior: "smooth", block: "nearest" });
    } catch(e) {
      showErr("Impossibile raggiungere il worker. Verificare WORKER_HASH_URL. (" + e.message + ")");
    } finally {
      attestBtn.classList.remove("loading");
      attestBtn.disabled = false;
      btnLabel.textContent = "Genera attestazione SHA-256";
    }
  });

  function showErr(msg) {
    errorMsg.textContent = "Errore: " + msg;
    errorMsg.classList.add("show");
  }

  function copyHash() {
    const h = document.getElementById("rHash").textContent;
    navigator.clipboard.writeText(h).then(() => {
      const b = document.getElementById("copyBtn");
      b.textContent = "Copiato";
      b.classList.add("ok");
      setTimeout(() => { b.textContent = "Copia"; b.classList.remove("ok"); }, 2000);
    });
  }

  // Download TXT (come prima)
  downloadBtn.addEventListener("click", () => {
    if (!lastData) return;
    const txt = [
      "SPAZIO GENESI ETS — CERTIFICATO DI ATTESTAZIONE OPERA",
      "=".repeat(54),
      "",
      "Opera:              " + lastData.opera,
      "Dimensione:         " + fmt(lastData.dimensione_bytes),
      "Tipo MIME:          " + lastData.tipo_mime,
      "SHA-256:            " + lastData.sha256,
      "Timestamp ISO:      " + lastData.timestamp_iso,
      "Timestamp leggibile:" + lastData.timestamp_leggibile,
      "",
      "Stringa di attestazione:",
      lastData.attestazione,
      "",
      "Firma HMAC (server): " + (lastData.hmac || "n/d"),
      "",
      "Emesso da: " + lastData.emesso_da,
    ].join("\n");

    const a = document.createElement("a");
    a.href = "data:text/plain;charset=utf-8," + encodeURIComponent(txt);
    a.download = "attestazione-" + lastData.sha256.slice(0, 12) + ".txt";
    a.click();
  });

  // --- Verifica hash ---

  function loadVerifyFile(f) {
    verifyFile = f;
    verifyPreviewName.textContent = f.name;
    verifyPreviewMeta.textContent = f.type + " · " + fmt(f.size);
    const fr = new FileReader();
    fr.onload = e => { verifyPreviewImg.src = e.target.result; };
    fr.readAsDataURL(f);
    verifyPreviewRow.classList.add("show");
    verifyErrorMsg.classList.remove("show");
    verifyResultWrap.classList.remove("show");
    updateVerifyBtnState();
  }

  function updateVerifyBtnState() {
    const hasFile = !!verifyFile;
    const hasHash = verifyHashInput.value.trim().length > 0;
    verifyBtn.disabled = !(hasFile && hasHash);
  }

  verifyFileInput.addEventListener("change", () => {
    if (verifyFileInput.files[0]) loadVerifyFile(verifyFileInput.files[0]);
  });

  verifyDropZone.addEventListener("dragover", e => { e.preventDefault(); verifyDropZone.classList.add("over"); });
  verifyDropZone.addEventListener("dragleave", () => verifyDropZone.classList.remove("over"));
  verifyDropZone.addEventListener("drop", e => {
    e.preventDefault();
    verifyDropZone.classList.remove("over");
    const f = e.dataTransfer.files[0];
    if (f) { verifyFileInput.files = e.dataTransfer.files; loadVerifyFile(f); }
  });

  verifyHashInput.addEventListener("input", updateVerifyBtnState);

  verifyBtn.addEventListener("click", async () => {
    if (!verifyFile || !verifyHashInput.value.trim()) return;

    verifyBtn.disabled = true;
    verifyBtnLabel.textContent = "Verifica in corso…";
    verifyErrorMsg.classList.remove("show");
    verifyResultWrap.classList.remove("show");

    try {
      const fd = new FormData();
      fd.append("image", verifyFile);
      fd.append("hash", verifyHashInput.value.trim());

      const res = await fetch(WORKER_VERIFY_URL, { method: "POST", body: fd });
      const d = await res.json();
      if (!res.ok) {
        verifyErrorMsg.textContent = "Errore: " + (d.error || ("HTTP " + res.status));
        verifyErrorMsg.classList.add("show");
        return;
      }

      verifyHashCalc.textContent = d.hash_calcolato;
      if (d.coincide) {
        verifyOutcome.textContent = "Esito: l'hash dichiarato coincide con l'hash calcolato per il file fornito.";
        verifyOutcome.style.color = "#2e7d32";
      } else {
        verifyOutcome.textContent = "Esito: l'hash dichiarato NON coincide con l'hash calcolato per il file fornito.";
        verifyOutcome.style.color = "#c0392b";
      }
      verifyResultWrap.classList.add("show");
      verifyResultWrap.scrollIntoView({ behavior: "smooth", block: "nearest" });
    } catch (e) {
      verifyErrorMsg.textContent = "Errore: impossibile raggiungere il worker. (" + e.message + ")";
      verifyErrorMsg.classList.add("show");
    } finally {
      verifyBtn.disabled = false;
      verifyBtnLabel.textContent = "Verifica hash";
    }
  });

  // --- Download PDF attestato dal worker ---

  // Puoi aggiungere un secondo bottone accanto al TXT, ad esempio:
  // <button class="btn-download" id="downloadPdfBtn">Scarica certificato PDF</button>
  const downloadPdfBtn = document.getElementById("downloadPdfBtn");
  if (downloadPdfBtn) {
    downloadPdfBtn.addEventListener("click", async () => {
      if (!lastData) return;
      try {
        const res = await fetch(WORKER_PDF_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(lastData),
        });
        if (!res.ok) {
          alert("Errore generazione PDF: " + res.status);
          return;
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "attestazione-" + lastData.sha256.slice(0, 12) + ".pdf";
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert("Errore di rete durante il download del PDF: " + e.message);
      }
    });
  }
</script>

</body>
</html>
